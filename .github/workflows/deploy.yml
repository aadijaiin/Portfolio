name: Update GitHub Repos

on:
  schedule:
    - cron: "30 18 * * *" # runs every day at 18:30 UTC (11:30 AM EST)
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: bun install

      - name: Fetch repos
        run: bun run scripts/fetchRepos.ts
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB }}

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add src/data/repos.json
          git commit -m "chore: update repos" || echo "No changes"
          git push
